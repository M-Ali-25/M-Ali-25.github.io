<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Self study at night illustration</title>
  <desc id="desc">An abstract night study illustration showing a desk, laptop, Python notes, and pressure from quizzes and lab work.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2340" />
      <stop offset="52%" stop-color="#173b63" />
      <stop offset="100%" stop-color="#2d5d93" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f9fbff" />
      <stop offset="100%" stop-color="#edf4fc" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#08172b" flood-opacity="0.24" />
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)" />
  <circle cx="980" cy="140" r="74" fill="#f6d49e" />
  <circle cx="980" cy="140" r="54" fill="#fbe3bf" />
  <circle cx="980" cy="140" r="38" fill="#fff4de" />

  <g opacity="0.72">
    <circle cx="160" cy="110" r="3" fill="#ffffff" />
    <circle cx="240" cy="170" r="3" fill="#ffffff" />
    <circle cx="330" cy="90" r="2.5" fill="#ffffff" />
    <circle cx="1080" cy="250" r="2.5" fill="#ffffff" />
    <circle cx="930" cy="220" r="3" fill="#ffffff" />
    <circle cx="1040" cy="80" r="2.5" fill="#ffffff" />
  </g>

  <g filter="url(#shadow)">
    <rect x="94" y="158" width="646" height="470" rx="34" fill="url(#panel)" />
  </g>
  <rect x="140" y="208" width="554" height="256" rx="28" fill="#173b63" />
  <rect x="176" y="246" width="126" height="18" rx="9" fill="#8cb6e0" />
  <rect x="176" y="292" width="212" height="18" rx="9" fill="#f3d39f" />
  <rect x="176" y="338" width="178" height="18" rx="9" fill="#8cb6e0" />
  <rect x="176" y="384" width="248" height="18" rx="9" fill="#f3d39f" />
  <text x="460" y="322" fill="#f7fbff" font-family="Fraunces, Georgia, serif" font-size="54" font-weight="700">for()</text>
  <text x="462" y="392" fill="#f7fbff" font-family="Fraunces, Georgia, serif" font-size="54" font-weight="700">def()</text>

  <rect x="252" y="518" width="336" height="26" rx="13" fill="#d7e3f2" />
  <rect x="308" y="556" width="228" height="22" rx="11" fill="#173b63" />

  <g filter="url(#shadow)">
    <rect x="794" y="164" width="314" height="228" rx="30" fill="#f8fbff" />
  </g>
  <text x="834" y="222" fill="#173b63" font-family="Fraunces, Georgia, serif" font-size="36" font-weight="700">Self-Study</text>
  <text x="834" y="266" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="20">Loops</text>
  <text x="834" y="298" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="20">Functions</text>
  <text x="834" y="330" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="20">Practice Programs</text>

  <g filter="url(#shadow)">
    <rect x="808" y="442" width="286" height="176" rx="32" fill="#132840" />
  </g>
  <rect x="844" y="482" width="104" height="34" rx="17" fill="#f3d39f" />
  <rect x="962" y="482" width="94" height="34" rx="17" fill="#8cb6e0" />
  <rect x="844" y="532" width="212" height="16" rx="8" fill="#ffffff" opacity="0.78" />
  <text x="844" y="580" fill="#ffffff" font-family="Sora, Arial, sans-serif" font-size="20">Labs, quizzes, and long nights of practice</text>
</svg>
