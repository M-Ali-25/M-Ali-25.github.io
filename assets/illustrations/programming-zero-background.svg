<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Programming fundamentals from zero illustration</title>
  <desc id="desc">An abstract illustration of a student starting Python and programming fundamentals from scratch, with code blocks, symbols, and study cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef4fb" />
      <stop offset="45%" stop-color="#f7efe4" />
      <stop offset="100%" stop-color="#dbe7f7" />
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#173b63" />
      <stop offset="100%" stop-color="#224e7e" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2c987" />
      <stop offset="100%" stop-color="#f7e1bf" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#16375c" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)" />
  <circle cx="1080" cy="150" r="130" fill="#f5d5ae" opacity="0.5" />
  <circle cx="140" cy="664" r="170" fill="#c5d8ef" opacity="0.5" />

  <g filter="url(#shadow)">
    <rect x="100" y="132" width="670" height="446" rx="34" fill="#f9fcff" />
  </g>
  <rect x="138" y="170" width="594" height="320" rx="26" fill="url(#screen)" />
  <rect x="170" y="208" width="118" height="18" rx="9" fill="#8cb6e0" />
  <rect x="170" y="252" width="178" height="18" rx="9" fill="#f4d49d" />
  <rect x="170" y="296" width="246" height="18" rx="9" fill="#8cb6e0" />
  <rect x="170" y="340" width="144" height="18" rx="9" fill="#f4d49d" />
  <rect x="170" y="384" width="220" height="18" rx="9" fill="#8cb6e0" />
  <text x="462" y="290" fill="#f7fbff" font-family="Fraunces, Georgia, serif" font-size="86" font-weight="700">{ }</text>
  <text x="530" y="388" fill="#f7fbff" font-family="Sora, Arial, sans-serif" font-size="58" font-weight="700">for</text>

  <rect x="316" y="528" width="238" height="28" rx="14" fill="#dbe6f4" />
  <rect x="382" y="570" width="108" height="26" rx="13" fill="#173b63" />
  <rect x="350" y="596" width="172" height="18" rx="9" fill="#9cbce0" />

  <g filter="url(#shadow)">
    <rect x="812" y="118" width="288" height="220" rx="30" fill="#ffffff" />
  </g>
  <text x="850" y="182" fill="#173b63" font-family="Fraunces, Georgia, serif" font-size="38" font-weight="700">From Zero</text>
  <rect x="850" y="216" width="92" height="34" rx="17" fill="#173b63" />
  <rect x="956" y="216" width="100" height="34" rx="17" fill="#f1cf95" />
  <rect x="850" y="266" width="126" height="34" rx="17" fill="#e7f0fb" stroke="#d6e2f1" />
  <rect x="988" y="266" width="68" height="34" rx="17" fill="#e7f0fb" stroke="#d6e2f1" />
  <text x="877" y="239" fill="#ffffff" font-family="Sora, Arial, sans-serif" font-size="18" font-weight="700">Python</text>
  <text x="986" y="239" fill="#173b63" font-family="Sora, Arial, sans-serif" font-size="18" font-weight="700">Logic</text>
  <text x="882" y="289" fill="#173b63" font-family="Sora, Arial, sans-serif" font-size="18" font-weight="700">Variables</text>
  <text x="1004" y="289" fill="#173b63" font-family="Sora, Arial, sans-serif" font-size="18" font-weight="700">Loops</text>

  <g filter="url(#shadow)">
    <rect x="826" y="390" width="276" height="222" rx="32" fill="#173b63" />
  </g>
  <circle cx="882" cy="458" r="30" fill="#f4d49d" />
  <circle cx="952" cy="458" r="30" fill="#8cb6e0" />
  <circle cx="1022" cy="458" r="30" fill="#f4d49d" />
  <line x1="912" y1="458" x2="922" y2="458" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
  <line x1="982" y1="458" x2="992" y2="458" stroke="#ffffff" stroke-width="8" stroke-linecap="round" />
  <rect x="864" y="520" width="194" height="18" rx="9" fill="#93bde5" />
  <rect x="864" y="552" width="138" height="18" rx="9" fill="#f4d49d" />
  <text x="864" y="594" fill="#ffffff" font-family="Sora, Arial, sans-serif" font-size="20">Learning basics under pressure</text>
</svg>
