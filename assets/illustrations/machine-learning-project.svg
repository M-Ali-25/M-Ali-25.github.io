  <polyline points="190,386 272,330 350,352 426,272 500,286 582,228 658,238" fill="none" stroke="#f5d49f" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  <circle cx="190" cy="386" r="10" fill="#f5d49f" />
  <circle cx="272" cy="330" r="10" fill="#f5d49f" />
  <circle cx="350" cy="352" r="10" fill="#f5d49f" />
