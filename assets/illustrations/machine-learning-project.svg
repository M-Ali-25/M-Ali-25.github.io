  <text x="854" y="254" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="20">Python</text>
  <text x="854" y="286" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="20">Prediction</text>
