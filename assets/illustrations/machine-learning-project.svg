  <circle cx="582" cy="228" r="10" fill="#f5d49f" />
  <circle cx="658" cy="238" r="10" fill="#f5d49f" />
  <rect x="178" y="224" width="116" height="18" rx="9" fill="#8cb6e0" />
  <rect x="178" y="260" width="152" height="18" rx="9" fill="#ffffff" opacity="0.84" />
  <rect x="178" y="296" width="134" height="18" rx="9" fill="#8cb6e0" />

