<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Machine learning project illustration</title>
  <desc id="desc">An abstract illustration of a first machine learning project with charts, Python code, and a used car price prediction theme.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef4fb" />
      <stop offset="42%" stop-color="#f8f2e7" />
      <stop offset="100%" stop-color="#dbe8f7" />
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15375b" />
      <stop offset="100%" stop-color="#4b86c8" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#16375c" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)" />
  <circle cx="1060" cy="138" r="132" fill="#f3d4a8" opacity="0.46" />
  <circle cx="132" cy="670" r="168" fill="#bfd5ef" opacity="0.46" />

