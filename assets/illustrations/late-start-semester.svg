<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Late start semester illustration</title>
  <desc id="desc">An abstract illustration of a semester already halfway completed, with a clock, study notes, and a catching-up timeline.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f6efe4" />
      <stop offset="50%" stop-color="#ebf2fb" />
      <stop offset="100%" stop-color="#dce9f8" />
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#173b63" />
      <stop offset="100%" stop-color="#4d8fd6" />
    </linearGradient>
    <linearGradient id="note" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fffdfa" />
      <stop offset="100%" stop-color="#f5f8fd" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#16375c" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)" />
  <circle cx="1050" cy="120" r="150" fill="#f0d7bb" opacity="0.55" />
  <circle cx="120" cy="700" r="180" fill="#bfd5ef" opacity="0.45" />

  <g filter="url(#shadow)">
    <rect x="96" y="106" width="682" height="560" rx="36" fill="url(#panel)" />
    <rect x="136" y="146" width="602" height="480" rx="28" fill="#f8fbff" opacity="0.98" />
  </g>

  <text x="170" y="210" fill="#173b63" font-family="Sora, Arial, sans-serif" font-size="30" font-weight="700">Semester 1</text>
  <text x="170" y="248" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="20">Joining late meant stepping into a class already in motion.</text>

  <rect x="170" y="292" width="530" height="22" rx="11" fill="#d7e4f3" />
  <rect x="170" y="292" width="300" height="22" rx="11" fill="#4d8fd6" />
  <circle cx="470" cy="303" r="18" fill="#173b63" />
  <text x="170" y="345" fill="#173b63" font-family="Sora, Arial, sans-serif" font-size="18" font-weight="700">Half the semester was already gone</text>

  <g transform="translate(170 390)">
    <rect width="172" height="136" rx="24" fill="#eef4fb" />
    <rect x="24" y="28" width="124" height="18" rx="9" fill="#b4cbe6" />
    <rect x="24" y="58" width="86" height="16" rx="8" fill="#173b63" opacity="0.85" />
    <rect x="24" y="88" width="112" height="16" rx="8" fill="#4d8fd6" opacity="0.9" />
    <text x="24" y="120" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="16">Mid exams were near</text>
  </g>

  <g transform="translate(370 390)">
    <rect width="172" height="136" rx="24" fill="#eef4fb" />
    <path d="M36 104 L74 64 L103 82 L136 42" fill="none" stroke="#173b63" stroke-linecap="round" stroke-linejoin="round" stroke-width="10" />
    <circle cx="36" cy="104" r="10" fill="#4d8fd6" />
    <circle cx="74" cy="64" r="10" fill="#4d8fd6" />
    <circle cx="103" cy="82" r="10" fill="#4d8fd6" />
    <circle cx="136" cy="42" r="10" fill="#4d8fd6" />
    <text x="28" y="120" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="16">Trying to catch up fast</text>
  </g>

  <g transform="translate(570 390)">
    <rect width="130" height="136" rx="24" fill="#eef4fb" />
    <rect x="38" y="28" width="54" height="78" rx="18" fill="#173b63" />
    <line x1="65" y1="40" x2="65" y2="68" stroke="#f8fbff" stroke-linecap="round" stroke-width="8" />
    <line x1="65" y1="68" x2="84" y2="82" stroke="#f8fbff" stroke-linecap="round" stroke-width="8" />
    <text x="18" y="122" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="16">Time pressure</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="820" y="142" width="282" height="204" rx="32" fill="url(#note)" />
  </g>
  <text x="858" y="206" fill="#173b63" font-family="Fraunces, Georgia, serif" font-size="36" font-weight="700">A Late Start</text>
  <text x="858" y="246" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="20">Programming</text>
  <text x="858" y="276" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="20">Concepts</text>
  <text x="858" y="306" fill="#5a697c" font-family="Sora, Arial, sans-serif" font-size="20">Catch-up</text>

  <g filter="url(#shadow)">
    <rect x="830" y="396" width="260" height="190" rx="32" fill="#173b63" />
  </g>
  <rect x="862" y="434" width="196" height="18" rx="9" fill="#89b7e8" />
  <rect x="862" y="468" width="148" height="16" rx="8" fill="#f7d5b0" />
  <rect x="862" y="500" width="174" height="16" rx="8" fill="#89b7e8" />
  <rect x="862" y="532" width="118" height="16" rx="8" fill="#f7d5b0" />
  <text x="862" y="570" fill="#ffffff" font-family="Sora, Arial, sans-serif" font-size="20">Learning while the semester keeps moving</text>
</svg>
